[MNIST]
train_img = "data/train-images.idx3-ubyte"
train_label = "data/train-labels.idx1-ubyte"
test_img = "data/t10k-images.idx3-ubyte"
test_label = "data/t10k-labels.idx1-ubyte"

# 超参数 = 测试
[hyper_parameters]
Iterations = 10000
BatchSize = 100
LearningRate = 0.01

[nerual_network]
model1 = [784, 50, 10]
processing_unit1 = ["FirstAffine", "Sigmoid", "Affine", "SoftmaxWithLoss"]
steps = [
  "convolution1",
  "ReLU",
  "Pooling1",
  "Affine:100",
  "ReLU",
  "Affine:10",
  "SoftmaxWithLoss"
]